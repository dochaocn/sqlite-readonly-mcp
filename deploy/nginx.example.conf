# 示例：TLS 终止 + 反代 sqlite-readonly-mcp（与 deploy/sqlite-readonly-mcp.env.example 中域名/端口对应）
# 多 worker 时须对 /mcp 使用会话粘性（如 ip_hash），否则 mcp-session-id 会落到错误进程

upstream sqlite_readonly_mcp {
    # 与后端 HOST:PORT 一致（默认本机 3333）
    server 127.0.0.1:3333;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name mcp.example.com;

    ssl_certificate     /path/to/fullchain.pem;
    ssl_certificate_key /path/to/privkey.pem;

    # MCP 使用带下划线的请求头（如 mcp-session-id），须显式允许
    underscores_in_headers on;

    # Streamable HTTP 主入口：须关闭缓冲、拉长超时，并透传 MCP 与会话相关头
    location /mcp {
        proxy_pass http://sqlite_readonly_mcp;
        proxy_http_version 1.1;

        gzip off;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header mcp-session-id $http_mcp_session_id;
        proxy_set_header Last-Event-ID $http_last_event_id;
        proxy_pass_header mcp-session-id;
    }

    # 统一无尾斜杠访问 /mcp
    location = /mcp/ {
        return 308 /mcp;
    }

    # 旧版 SSE：GET /sse
    location /sse {
        proxy_pass http://sqlite_readonly_mcp;
        proxy_http_version 1.1;

        gzip off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # 旧版：SSE 配套 POST /messages
    location /messages {
        proxy_pass http://sqlite_readonly_mcp;
        proxy_http_version 1.1;

        gzip off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # 健康检查：仅允许本机（与程序 /health 行为一致）
    location /health {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://sqlite_readonly_mcp;
        proxy_set_header Host $host;
    }
}
